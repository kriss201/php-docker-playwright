name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Start PHP server and database elasticsearch
        env:
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        run: |
          sudo sysctl -w vm.max_map_count=262144
          mkdir -p .docker/elasticsearch/volume/data
          chmod 777 .docker/elasticsearch/volume/data
          docker compose up -d server db elasticsearch || (docker logs php-docker-playwright-elasticsearch-1 && exit 1)
      - name: Wait for PHP server to be ready
        run: timeout 120 bash -c 'until curl -sf http://localhost:8190 > /dev/null; do sleep 3; done'
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install dependencies
        working-directory: tests/e2e
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:8190
          CI: true
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30